<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Cafe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .admin-header {
            background-color: #333;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .header-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn-login {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            background-color: #2196F3;
            border-radius: 4px;
        }
        .btn-login:hover {
            background-color: #0b7dda;
        }
        .content {
            margin: 20px;
        }
        form {
            max-width: 500px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            background-color: #45a049;
        }
        a {
            color: white;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="logo">Administracion - AGREGAR</div>
        <div class="header-links">
            <a href="{% url 'cafe_list' %}" class="btn-login">Volver</a>
        </div>
    </header>
    
    <div class="content">
        <h1>Agregar Producto</h1>
        
        {% if success %}
            <div style="color: green; margin: 10px 0;">
                <p>¡Producto agregado exitosamente!</p>
            </div>
        {% endif %}
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Agregar</button>
        </form>
    </div>
</body>
</html>
