{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>Agregar Usuario</title>
</head>
<body>
    <div class="login-container">
        <h1>Nuevo Usuario</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email">
            <input type="password" name="password" placeholder="Password" required>
            <div style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" name="is_superuser" id="is_superuser" style="width: auto; margin: 0; cursor: pointer;">
                <label for="is_superuser" style="font-size: 15px; color: #333; cursor: pointer; user-select: none;">¿es admin?</label>
            </div>
            <button type="submit">Guardar</button>
        </form>
        <p><a href="{% url 'user_list' %}">Volver</a></p>
    </div>
</body>
</html>
