{% extends 'base.html' %}

{% block title %}Inicio{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="hero">
        <div class="hero-text">
            <h1>Cafe deslumbrante, <br> para empresarios</h1>
            <p>sean bienvenidos</p>
        </div>
    </section>
    <section class="products">
        <h2>Productos Recientes</h2>
        <div class="grid">
            {% for product in products %}
            <div class="card">
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                <h3>{{ product.name }}</h3>
                <p>${{ product.price|floatformat:2 }}</p>
            </div>
            {% endfor %}
        </div>
    </section>
</body>
</html>
{% endblock %}
